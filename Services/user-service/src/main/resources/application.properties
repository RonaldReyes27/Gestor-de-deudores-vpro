# Servidor
spring.application.name=user-service
server.port=${PORT:8087}

# Base de datos SQLite
spring.datasource.url=jdbc:sqlite:user-service.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JPA
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT (misma clave que el auth-service)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000

# Internal auth between services
auth.internal-key=${AUTH_INTERNAL_KEY:change-me-in-env}

# Seed inicial de admin (recomendado sobreescribir por variables de entorno en producción)
app.seed-admin.enabled=${SEED_ADMIN_ENABLED:true}
app.seed-admin.email=${SEED_ADMIN_EMAIL:admin@deuda.local}
app.seed-admin.username=${SEED_ADMIN_USERNAME:admin}
app.seed-admin.full-name=${SEED_ADMIN_FULL_NAME:Administrador}
app.seed-admin.password=${SEED_ADMIN_PASSWORD:Admin$123}
